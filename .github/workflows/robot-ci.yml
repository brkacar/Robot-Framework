name: Robot Framework Tests + Allure

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      api_exit_code: ${{ steps.api_tests.outputs.exit_code }}
      ui_exit_code: ${{ steps.ui_tests.outputs.exit_code }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Clean previous results
        if: always()
        run: |
          rm -rf results allure-results allure-report allure-history gh-pages

      - name: Run API tests with Allure listener
        id: api_tests
        continue-on-error: true
        run: |
          set +e
          robot --outputdir results/api \
                --listener allure_robotframework:allure-results \
                --include api \
                tests/
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run UI tests with Allure listener
        id: ui_tests
        continue-on-error: true
        run: |
          set +e
          robot --outputdir results/ui \
                --listener allure_robotframework:allure-results \
                --variable BROWSER:headlesschrome \
                --exclude api \
                tests/
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Add Allure categories
        if: always()
        run: |
          mkdir -p allure-results
          cat > allure-results/categories.json <<'EOF'
          [
            {
              "name": "UI test failures",
              "matchedStatuses": ["failed", "broken"],
              "traceRegex": ".*(SeleniumLibrary|Click Element|Wait Until Element|locator|browser|chromedriver).*"
            },
            {
              "name": "API test failures",
              "matchedStatuses": ["failed", "broken"],
              "traceRegex": ".*(RequestsLibrary|status code|response|API|json|request).*"
            }
          ]
          EOF

      - name: Merge Robot outputs
        if: always()
        run: |
          rebot --output results/output.xml \
                --log results/log.html \
                --report results/report.html \
                results/api/output.xml results/ui/output.xml || true

      - name: Install Allure CLI
        if: always()
        run: |
          npm install -g allure-commandline --save-dev

      - name: Generate Allure HTML report
        if: always()
        run: |
          allure generate allure-results --clean -o allure-report

      - name: Upload Robot results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: results/
          retention-days: 14

      - name: Upload Allure raw results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 14

      - name: Upload Allure HTML report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 14

      - name: Publish Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report

      - name: Add Allure link to job summary
        if: always()
        run: |
          echo "## Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- [Open latest Allure report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)" >> $GITHUB_STEP_SUMMARY
          echo "- [Download Allure HTML artifact](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "- API test exit code: ${{ steps.api_tests.outputs.exit_code }}" >> $GITHUB_STEP_SUMMARY
          echo "- UI test exit code: ${{ steps.ui_tests.outputs.exit_code }}" >> $GITHUB_STEP_SUMMARY

      - name: Fail job if tests failed
        if: always()
        run: |
          API_EXIT="${{ steps.api_tests.outputs.exit_code }}"
          UI_EXIT="${{ steps.ui_tests.outputs.exit_code }}"

          echo "API exit code: $API_EXIT"
          echo "UI exit code: $UI_EXIT"

          if [ "$API_EXIT" != "0" ] || [ "$UI_EXIT" != "0" ]; then
            echo "One or more test suites failed."
            exit 1
          fi
