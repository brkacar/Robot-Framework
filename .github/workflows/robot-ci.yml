name: Robot Framework Tests + Allure

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Install Allure CLI
        run: |
          npm install -g allure-commandline --save-dev

      - name: Show versions
        run: |
          python --version
          python -c "import robot; print(robot.__version__)"
          google-chrome --version
          chromedriver --version
          java -version
          allure --version

      - name: Ensure allure-results directory exists
        run: mkdir -p allure-results

      - name: Run API tests
        id: api_tests
        continue-on-error: true
        run: |
          set +e
          robot --outputdir results/api \
            --listener allure_robotframework:allure-results \
            --include api \
            tests/
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run UI tests
        id: ui_tests
        continue-on-error: true
        run: |
          set +e
          robot --outputdir results/ui \
            --listener allure_robotframework:allure-results \
            --variable BROWSER:headlesschrome \
            --exclude api \
            tests/
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Merge Robot outputs
        if: always()
        run: |
          rebot --output results/output.xml \
            --log results/log.html \
            --report results/report.html \
            results/api/output.xml results/ui/output.xml || true

      - name: Upload Robot results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: results/
          retention-days: 14

      - name: Upload Allure raw results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 14

      - name: Generate Job Summary
        if: always()
        env:
          ALLURE_REPORT_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: |
          python .github/scripts/robot_summary.py

      - name: Load Allure history
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Build Allure report
        if: always()
        continue-on-error: true
        run: |
          mkdir -p allure-history
          if [ -d "gh-pages/" ]; then
            cp -r gh-pages/. allure-history/ 2>/dev/null || true
          fi
          allure generate allure-results --clean -o allure-history || true

      - name: Publish Allure report to GitHub Pages
        if: always()
        continue-on-error: true
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Fail job if tests failed
        if: always()
        run: |
          API_EXIT="${{ steps.api_tests.outputs.exit_code }}"
          UI_EXIT="${{ steps.ui_tests.outputs.exit_code }}"
          API_EXIT="${API_EXIT:-0}"
          UI_EXIT="${UI_EXIT:-0}"
          echo "API exit code: $API_EXIT"
          echo "UI exit code: $UI_EXIT"
          if [ "$API_EXIT" != "0" ] || [ "$UI_EXIT" != "0" ]; then
            echo "One or more test suites failed."
            exit 1
          fi
