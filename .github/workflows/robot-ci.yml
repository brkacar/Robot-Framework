name: Robot Framework Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Run API tests
        run: |
          robot --outputdir results/api \
                --include api \
                tests/

      - name: Run UI tests
        run: |
          robot --outputdir results/ui \
                --variable BROWSER:headlesschrome \
                --exclude api \
                tests/

      - name: Merge Robot outputs
        if: always()
        run: |
          rebot --output results/output.xml \
                --log results/log.html \
                --report results/report.html \
                results/api/output.xml results/ui/output.xml

      - name: Upload Robot results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: results/
          retention-days: 14

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: results

  publish-report:
    if: always()
    needs: test
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  summary:
    if: always()
    needs: [test, publish-report]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Robot results artifact
        uses: actions/download-artifact@v4
        with:
          name: robot-results
          path: results

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate Job Summary with clickable failed tests
        env:
          ROBOT_REPORT_BASE_URL: ${{ needs.publish-report.outputs.page_url }}
        run: |
          python .github/scripts/robot_summary.py